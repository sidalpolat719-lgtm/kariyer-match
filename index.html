<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1a3a" />
    <meta
      name="description"
      content="PathMatch — Yetenek bazlı staj ve iş eşleştirme platformu. Kariyerine en uygun fırsatları keşfet."
    />
    <title>PathMatch — Akıllı Kariyer ve Staj Eşleştirme</title>
    <script type="text/javascript">
      // SPA GitHub Pages — 404.html'den gelen redirect'i gerçek route'a çevirir
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
